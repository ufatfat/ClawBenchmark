name: Claude Auto-Implement

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "/implement"
          label_trigger: "ai-task"
          prompt: |
            你是 ClawBenchmark 项目的全栈工程师。请根据 Issue 内容实现代码。

            ## 要求
            1. 先阅读 CLAUDE.md 了解项目规范
            2. 阅读 docs/PRD.md 中与本 Issue 相关的章节
            3. 检查现有代码，理解当前架构和模式
            4. 实现功能代码 + 编写单元测试
            5. 确保代码没有语法错误
          claude_args: "--allowedTools Bash Read Write Edit Glob Grep"
